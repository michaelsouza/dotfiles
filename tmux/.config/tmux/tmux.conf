# ~/.config/tmux/tmux.conf

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Core behavior
set -g mouse on
set -g history-limit 100000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Terminal compatibility
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -g set-clipboard on

# Session ergonomics
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation and resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind T command-prompt -p "pane title:" "select-pane -T '%%'"

# Copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi Escape send -X cancel

# Status line
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour235,bg=colour39,bold] #S #[fg=colour39,bg=colour235] "
set -g status-right "#[fg=colour242]%Y-%m-%d #[fg=colour39]%H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour235,bg=colour82,bold] #I:#W #[default]"
setw -g window-status-separator ""

set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour39"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=colour235#,bg=colour39#,bold],#[fg=colour248#,bg=colour238]} #P #{?#{!=:#{pane_title},#{host_short}},#{pane_title},#{pane_current_command}} #[fg=colour242]#{b:pane_current_path} "
set -g message-style "bg=colour39,fg=colour235,bold"
